<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jayanth.mov</title>
    <meta
      name="description"
      content="Official links for Jayanth.mov — Instagram, X, YouTube, TikTok, and contact."
    />
    <script>
      if (window.location.hostname === "ye.jayanth.mov" && !window.location.pathname.startsWith("/ye/")) {
        window.location.replace("/ye/index.html");
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Instrument+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #070809;
        --panel: #101316;
        --panel-border: rgba(255, 255, 255, 0.1);
        --text: #f4f5f6;
        --muted: #9ea5ae;
        --accent: #ff5353;
        --accent-2: #ffd86f;
        --max-width: 520px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 600px at 85% -5%, rgba(255, 83, 83, 0.18), transparent 60%),
          radial-gradient(700px 420px at -15% 75%, rgba(255, 216, 111, 0.1), transparent 60%),
          var(--bg);
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.12;
        mix-blend-mode: soft-light;
        background-image: radial-gradient(circle at 1px 1px, #fff 1px, transparent 0);
        background-size: 3px 3px;
      }

      .shell {
        width: 100%;
        margin: 0 auto;
        padding-bottom: 2.5rem;
      }

      .hero {
        position: relative;
        height: min(46vh, 430px);
        min-height: 280px;
        width: 100%;
        border-radius: 0;
        overflow: hidden;
        animation: reveal 900ms cubic-bezier(0.18, 0.88, 0.21, 1) both;
      }

      .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 30%;
        display: block;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0) 45%, rgba(7, 8, 9, 0.96) 86%, rgba(7, 8, 9, 1) 100%),
          linear-gradient(100deg, rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0));
      }

      .identity {
        margin-top: -2.1rem;
        position: relative;
        z-index: 2;
        text-align: center;
        animation: lift 850ms cubic-bezier(0.2, 0.78, 0.2, 1) 120ms both;
        width: min(var(--max-width), calc(100% - 2rem));
        margin-left: auto;
        margin-right: auto;
      }

      h1 {
        margin: 0;
        font-family: "Syne", sans-serif;
        font-size: clamp(2rem, 8vw, 2.8rem);
        letter-spacing: -0.03em;
      }

      .tag {
        margin-top: 0.4rem;
        color: var(--muted);
        font-size: 0.96rem;
      }

      .links {
        list-style: none;
        margin: 1rem 0 0;
        padding: 0 1rem;
        display: grid;
        gap: 0.8rem;
        width: min(var(--max-width), 100%);
        margin-left: auto;
        margin-right: auto;
      }

      .links li {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
        animation: riseIn 600ms ease both;
      }

      .links li:nth-child(1) { animation-delay: 210ms; }
      .links li:nth-child(2) { animation-delay: 290ms; }
      .links li:nth-child(3) { animation-delay: 350ms; }
      .links li:nth-child(4) { animation-delay: 410ms; }
      .links li:nth-child(5) { animation-delay: 470ms; }
      .links li:nth-child(6) { animation-delay: 530ms; }

      .social-links {
        list-style: none;
        margin: 1.05rem auto 0;
        padding: 0 1rem;
        display: flex;
        justify-content: center;
        gap: 0.7rem;
        width: min(var(--max-width), 100%);
      }

      .social-links li {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
        animation: riseIn 600ms ease both;
      }

      .social-links li:nth-child(1) { animation-delay: 170ms; }
      .social-links li:nth-child(2) { animation-delay: 230ms; }
      .social-links li:nth-child(3) { animation-delay: 290ms; }
      .social-links li:nth-child(4) { animation-delay: 350ms; }
      .social-links li:nth-child(5) { animation-delay: 410ms; }

      .social-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3.1rem;
        height: 3.1rem;
        color: var(--text);
        text-decoration: none;
        border-radius: 14px;
        border: 1px solid var(--panel-border);
        background: linear-gradient(155deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03));
        backdrop-filter: blur(8px);
        overflow: hidden;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .social-link:hover,
      .social-link:focus-visible {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.24);
        background: linear-gradient(155deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05));
      }

      .social-link .icon-badge {
        width: 100%;
        height: 100%;
        border-radius: inherit;
        border: 0;
      }

      .social-link .icon-badge svg {
        width: 1.35rem;
        height: 1.35rem;
      }

      .link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        color: var(--text);
        text-decoration: none;
        padding: 0.9rem 1rem;
        border-radius: 14px;
        border: 1px solid var(--panel-border);
        background: linear-gradient(155deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
        backdrop-filter: blur(8px);
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .link-main {
        display: inline-flex;
        align-items: center;
        gap: 0.72rem;
        min-width: 0;
      }

      .icon-badge {
        width: 1.9rem;
        height: 1.9rem;
        border-radius: 9px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
        flex-shrink: 0;
      }

      .icon-badge svg {
        width: 1.02rem;
        height: 1.02rem;
      }

      .link:hover,
      .link:focus-visible {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.24);
        background: linear-gradient(155deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
      }

      .link span {
        font-size: 0.97rem;
        font-weight: 500;
      }

      .label {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .instagram .icon-badge {
        background: linear-gradient(135deg, #f58529, #dd2a7b 42%, #8134af 72%, #515bd4);
      }

      .x .icon-badge {
        background: #0f1419;
      }

      .youtube .icon-badge {
        background: #ff0000;
      }

      .tiktok .icon-badge {
        background: #121212;
      }

      .email .icon-badge {
        background: #2e8cff;
      }

      .arrow {
        color: rgba(255, 255, 255, 0.68);
        font-size: 1.1rem;
      }

      .featured .link {
        position: relative;
        min-height: 228px;
        justify-content: center;
        align-items: center;
        padding: 1.3rem 1.1rem;
        border-color: rgba(255, 216, 111, 0.72);
        background-image:
          linear-gradient(to top, rgba(5, 6, 8, 0.9) 10%, rgba(5, 6, 8, 0.62) 50%, rgba(5, 6, 8, 0.34) 100%),
          url("./Ye.png");
        background-size: cover;
        background-position: center 40%;
        background-repeat: no-repeat;
        box-shadow: 0 0 0 1px rgba(255, 216, 111, 0.28), 0 10px 30px rgba(0, 0, 0, 0.35);
      }

      .featured .link:hover,
      .featured .link:focus-visible {
        transform: translateY(-2px) scale(1.01);
        border-color: rgba(255, 216, 111, 0.94);
      }

      .featured span {
        font-family: "Syne", sans-serif;
        font-size: 1.02rem;
        line-height: 1.32;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      }

      .featured .label {
        white-space: normal;
        max-width: 100%;
        text-align: center;
        text-wrap: balance;
      }

      .featured .arrow {
        font-family: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 1.1rem;
        font-weight: 500;
        line-height: 1;
        text-shadow: none;
      }

      .featured .icon-badge {
        background: linear-gradient(145deg, #ff6a00, #ff0000);
        border-color: rgba(255, 226, 141, 0.55);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.45);
      }

      .featured .link-main {
        justify-content: center;
        width: 100%;
        gap: 0.45rem;
      }

      .featured .icon-badge {
        display: none;
      }

      .footnote {
        margin-top: 1.15rem;
        text-align: center;
        color: var(--muted);
        font-size: 0.82rem;
        width: min(var(--max-width), calc(100% - 2rem));
        margin-left: auto;
        margin-right: auto;
      }

      @keyframes reveal {
        from { opacity: 0; transform: translateY(-6px) scale(0.99); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes lift {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes riseIn {
        from { opacity: 0; transform: translateY(10px) scale(0.99); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      @media (max-width: 480px) {
        .shell { padding-bottom: 1.6rem; }

        .hero {
          min-height: 240px;
          border-radius: 0;
        }

        .social-links {
          gap: 0.58rem;
          padding: 0 0.6rem;
        }

        .social-link {
          width: 2.9rem;
          height: 2.9rem;
        }

        .links {
          gap: 0.7rem;
          padding: 0 0.6rem;
        }

        .link {
          padding: 0.84rem 0.9rem;
        }

        .featured .link {
          min-height: 206px;
          padding: 1.1rem 0.95rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 1ms !important;
          transition-duration: 1ms !important;
        }
      }
    </style>
  </head>
